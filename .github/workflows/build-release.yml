name: Build Jar Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Jar
        run: mvn -B clean package -DskipTests

      - name: Prepare artifact
        run: cp target/opengauss-mcp.jar opengauss-mcp-${{ github.ref_name }}.jar

      - name: Create GitHub Release and upload Jar
        uses: softprops/action-gh-release@v2
        with:
          name: opengauss-mcp ${{ github.ref_name }}
          files: opengauss-mcp-${{ github.ref_name }}.jar
