spring:
  main:
    banner-mode: off
    web-application-type: none
  datasource:
    url: jdbc:opengauss://${OPENGAUSS_HOST}:${OPENGAUSS_PORT}/${OPENGAUSS_DATABASE}?currentSchema=${OPENGAUSS_SCHEMA}&options=-c%20TimeZone%3DAsia%2FShanghai%20&sslmode=prefer&channelBinding=prefer&stringtype=unspecified
    username: ${OPENGAUSS_USERNAME}
    password: ${OPENGAUSS_PASSWORD}
    driver-class-name: org.opengauss.Driver
    hikari:
      pool-name: opengauss-mcp-pool
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 3000
      validation-timeout: 1000
      idle-timeout: 180000
      max-lifetime: 900000
      keepalive-time: 300000
      leak-detection-threshold: 20000
      initialization-fail-timeout: 10000
      auto-commit: true
  jackson:
    default-property-inclusion: always
    serialization:
      write-null-map-values: true
  ai:
    mcp:
      server:
        name: opengauss-mcp
        version: 1.0.0
        stdio: true
logging:
  threshold:
    console: OFF
